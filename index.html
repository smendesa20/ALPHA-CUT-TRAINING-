<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Alpha Cut 2.0</title>
  <meta name="theme-color" content="#09090b">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Black+Ops+One&family=Russo+One&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      /* tactical base colors */
      --p1: #657a55; /* olive */
      --p2: #4f6b82; /* slate */
      --p3: #c2410c; /* burnt orange */
      --p4: #991b1b; /* crimson */
      
      --bg: #09090b;
      --surface: #18181b;
      --surface2: #1f1f23;
      --surface3: #27272a;
      --border: #27272a;
      --border-hi: #3f3f46;
      --text: #fafafa;
      --text2: #a1a1aa;
      --text3: #71717a;
      --muted: #52525b;
      --yellow: #facc15;
      --danger: #ef4444;
      --danger-bright: #f87171;
      --success: #22c55e;
      --success-bright: #4ade80;
      --compound: #60a5fa;
      --radius: 8px;

      /* default theme vars (will be overridden by phase) */
      --accent: var(--p1);
      --accent-bright: #819870;
      --accent-dim: rgba(101,122,85,0.15);
      --accent-glow: rgba(101,122,85,0.3);
      --ring: var(--accent-glow);
      --amber: #c2410c;
      --amber-bright: #ea580c;
      --amber-dim: rgba(194,65,12,0.15);
      --amber-glow: rgba(194,65,12,0.3);
    }
    
    .theme-p1 { --accent: var(--p1); --accent-bright: #819870; --accent-dim: rgba(101,122,85,0.15); --accent-glow: rgba(101,122,85,0.3); --ring: var(--accent-glow); }
    .theme-p2 { --accent: var(--p2); --accent-bright: #698ba8; --accent-dim: rgba(79,107,130,0.15); --accent-glow: rgba(79,107,130,0.3); --ring: var(--accent-glow); }
    .theme-p3 { --accent: var(--p3); --accent-bright: #ea580c; --accent-dim: rgba(194,65,12,0.15); --accent-glow: rgba(194,65,12,0.3); --ring: var(--accent-glow); }
    .theme-p4 { --accent: var(--p4); --accent-bright: #b91c1c; --accent-dim: rgba(153,27,27,0.15); --accent-glow: rgba(153,27,27,0.3); --ring: var(--accent-glow); }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      letter-spacing: -0.02em;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
      font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
      -webkit-font-smoothing: antialiased;
    }

    /* ========== HEADER ========== */
    .app-header {
      position:sticky; top:0; z-index:100;
      background: rgba(9,9,11,0.85);
      backdrop-filter: blur(16px) saturate(180%);
      border-bottom: 1px solid var(--border);
      padding: 16px 16px 0;
    }
    .hdr-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
    .hdr-brand {
      font-family: 'Black Ops One', system-ui, sans-serif;
      font-size: 44px; font-weight: normal; letter-spacing: 2px;
      color: #a3a3a3;
      line-height: 1;
      white-space: nowrap;
      text-transform: uppercase;
    }
    .app-icon-img { width: 75px; height: 75px; border-radius: 12px; flex-shrink: 0; }
    .hdr-sub {
      font-size: 14px; color: #ffffff; letter-spacing: 0.5px;
      font-weight: 600;
      line-height: 1;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .hdr-actions { display:flex; gap:6px; }
    .icon-btn {
      width:36px; height:36px; border-radius:var(--radius);
      border:1px solid var(--border); background:var(--surface);
      color:var(--text3); font-size:14px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:all 0.15s;
    }
    .icon-btn:hover { border-color:var(--border-hi); color:var(--text); background:var(--surface2); }
    .icon-btn:active { transform:scale(0.95); }

    .dropdown-menu {
      position: absolute; right: 0; top: 48px;
      background: rgba(24, 24, 27, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border-hi);
      border-radius: var(--radius);
      padding: 8px 0;
      min-width: 160px;
      display: none;
      flex-direction: column;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      z-index: 200;
    }
    .dropdown-menu.show { display: flex; }
    .dropdown-item {
      padding: 12px 16px;
      color: var(--text2);
      font-size: 15px; font-weight: 600;
      background: transparent;
      border: none;
      text-align: left;
      cursor: pointer;
      font-family:'Inter', sans-serif;
      transition: all 0.15s;
    }
    .dropdown-item:hover { color: var(--accent); background: var(--surface2); }

    /* ========== NAV TABS ========== */
    .nav-tabs { display:flex; gap:0; overflow-x:auto; scrollbar-width:none; }
    .nav-tabs::-webkit-scrollbar { display:none; }
    .nav-tab {
      padding:10px 14px;
      font-size:13px; font-weight:500;
      color:var(--text3); cursor:pointer; white-space:nowrap;
      border-bottom:2px solid transparent;
      transition:all 0.15s;
    }
    .nav-tab:hover { color:var(--text2); }
    .nav-tab.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:600; }

    main { padding:16px; padding-bottom:100px; max-width:600px; margin:0 auto; }

    /* ========== PHASE HEADER ========== */
    .phase-header {
      border-radius:var(--radius); padding:16px; margin-bottom:16px;
      border:1px solid var(--accent-glow); background:var(--accent-dim);
    }
    .phase-name { font-size:15px; font-weight:700; color:var(--text); letter-spacing:-0.2px; }
    .phase-detail { font-size:12px; color:var(--text2); margin-top:6px; line-height:1.6; }
    .phase-badge {
      display:inline-block; padding:3px 10px; border-radius:calc(var(--radius) - 2px);
      font-size:11px; font-weight:600; letter-spacing:0.3px;
      margin-top:10px; background:var(--bg); border:1px solid var(--accent-glow); color:var(--accent);
    }

    /* ========== PHASE TABS ========== */
    .phase-tabs {
      display:flex; gap:4px; overflow-x:auto; scrollbar-width:none;
      margin-bottom:12px; padding:3px; border-radius:var(--radius);
      background:var(--surface);
    }
    .phase-tabs::-webkit-scrollbar { display:none; }
    .phase-tab {
      flex:1; padding:10px 4px; text-align:center;
      font-size:12px; font-weight:600;
      color:var(--text3); cursor:pointer; border-radius:calc(var(--radius) - 2px);
      transition:all 0.15s; white-space:nowrap; min-width:60px;
    }
    .phase-tab:hover { color:var(--text2); background:var(--surface2); }
    .phase-tab.active { background:var(--accent); color:#000; }
    .phase-tab.completed { opacity: 0.8; }
    .phase-tab.completed:not(.active) { color:var(--success-bright); }

    /* ========== WEEK SELECTOR ========== */
    .week-selector { display:grid; grid-template-columns: repeat(4, 1fr); gap:4px; margin-bottom:16px; }
    .week-btn {
      padding:8px 2px; border-radius:var(--radius);
      border:1px solid var(--border); background:var(--surface);
      color:var(--text3); font-size:12px; font-weight:500; text-align:center;
      cursor:pointer; transition:all 0.15s;
    }
    .week-btn:hover { border-color:var(--border-hi); color:var(--text2); }
    .week-btn:active { transform:scale(0.96); }
    .week-btn.active {
      background:var(--accent); color:#000; font-weight:600;
      border-color:var(--accent); box-shadow:0 0 12px var(--accent-glow);
    }
    .week-btn.deload { border-color:rgba(250,204,21,0.3); color:var(--yellow); }
    .week-btn.deload.active { background:var(--yellow); color:#000; border-color:var(--yellow); box-shadow:0 0 10px rgba(250,204,21,0.2); }
    .week-btn.test { border-color:rgba(239,68,68,0.3); color:var(--danger-bright); }
    .week-btn.test.active { background:var(--danger); color:#fff; border-color:var(--danger); }
    .week-btn.completed:not(.active) { color:var(--success-bright); border-color: rgba(34,197,94,0.3); background:rgba(34,197,94,0.05); }
    .week-btn .wk-label { font-size:8px; display:block; margin-top:1px; opacity:0.7; }

    /* ========== DAY TABS ========== */
    .day-tabs {
      display:flex; gap:2px; overflow-x:auto; scrollbar-width:none;
      margin-bottom:16px; padding:3px; border-radius:var(--radius);
      background:var(--surface);
    }
    .day-tabs::-webkit-scrollbar { display:none; }
    .day-tab {
      flex:1; padding:8px 4px; text-align:center;
      font-size:11px; font-weight:500;
      color:var(--text3); cursor:pointer; border-radius:calc(var(--radius) - 2px);
      transition:all 0.15s; white-space:nowrap; min-width:56px;
    }
    .day-tab:hover { color:var(--text2); background:var(--surface2); }
    .day-tab.active { background:var(--accent); color:#000; font-weight:600; }
    .day-tab .day-num { font-size:14px; font-weight:800; display:block; }
    .day-tab .day-check { font-size:9px; display:block; margin-top:1px; color:var(--success-bright); }
    .day-tab.active .day-check { color:#000; }

    /* ========== DAY COMPLETION ========== */
    .day-completion {
      display:flex; justify-content:space-between; align-items:center;
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:12px 14px; margin-bottom:14px;
    }
    .dc-left { font-size:13px; color:var(--text2); font-weight:500; }
    .dc-left strong { color:var(--text); }
    .dc-bar { flex:1; height:4px; background:var(--surface3); border-radius:2px; margin:0 14px; overflow:hidden; }
    .dc-fill { height:100%; border-radius:2px; background:var(--accent); transition:width 0.3s; }
    .dc-right { font-size:12px; font-weight:600; color:var(--accent); white-space:nowrap; }
    .dc-complete { color:var(--success-bright); }
    .dc-date { font-size:11px; color:var(--text3); }

    /* ========== EXERCISE CARDS ========== */
    .exercise-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:14px; margin-bottom:8px;
      transition:all 0.15s;
    }
    .exercise-card.compound { border-left:3px solid var(--compound); }
    .exercise-card.logged { border-left:3px solid var(--success); }
    .exercise-card.compound.logged { border-left:3px solid var(--success); }
    .ex-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:4px; }
    .ex-name { font-size:14px; font-weight:600; line-height:1.3; display:flex; align-items:center; }
    .ex-name.compound { color:var(--compound); }
    .ex-loc {
      font-size:10px; font-weight:600; padding:2px 8px; border-radius:calc(var(--radius) - 2px);
      white-space:nowrap; margin-left:8px;
    }
    .history-btn {
      background:none; border:1px solid var(--border); color:var(--text3); font-size:10px; font-weight:600; cursor:pointer;
      margin-left:auto; border-radius:4px; padding:2px 6px; transition:all 0.15s; font-family:'Inter', sans-serif; text-transform:uppercase;
    }
    .history-btn:hover { color:var(--text); border-color:var(--border-hi); background:var(--surface2); }
    .ex-loc.home { background:rgba(34,197,94,0.1); color:var(--success); }
    .ex-loc.gym { background:rgba(245,158,11,0.1); color:var(--p3); }
    .ex-loc.either { background:rgba(59,130,246,0.1); color:var(--compound); }
    .ex-meta { display:flex; gap:12px; align-items:center; margin-bottom:4px; }
    .ex-target, .ex-reps { font-size:12px; color:var(--text2); }
    .ex-reps { font-weight:600; color:var(--accent); }
    .ex-note {
      font-size:12px; color:var(--text3); line-height:1.5; margin-bottom:8px;
      padding-left:10px; border-left:2px solid var(--border);
    }
    .prev-week-ref {
      font-size:11px; color:var(--text3); margin-bottom:8px;
      padding:6px 10px; background:var(--accent-dim);
      border-radius:calc(var(--radius) - 2px); border-left:2px solid var(--accent);
    }
    .prev-week-ref strong { color:var(--accent); }

    /* ========== SUPERSET GROUPS (Future Use) ========== */
    .superset-group {
      border: 2px dashed var(--border-hi); border-radius: calc(var(--radius) + 4px);
      padding: 8px; margin-bottom: 8px; position: relative;
    }
    .superset-group::before {
      content: 'SUPERSET'; position: absolute; top: -10px; left: 16px;
      background: var(--bg); padding: 0 8px; font-size: 10px; font-weight: 800;
      color: var(--accent); letter-spacing: 0.5px;
    }
    .superset-item { margin-bottom: 0; border: none; border-bottom: 1px solid var(--border); border-radius: 0; }
    .superset-item:last-child { border-bottom: none; padding-bottom: 0; }

    /* ========== LOG SECTION ========== */
    .log-section {
      display:none; background:var(--bg);
      border-radius:var(--radius); padding:12px; margin-top:8px;
      border:1px solid var(--border);
    }
    .log-section.open { display:block; }
    .log-set-row { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
    .log-set-label { font-size:11px; font-weight:600; color:var(--text3); min-width:42px; }
    .log-input {
      padding:10px 8px; border-radius:var(--radius); width:80px;
      border:1px solid var(--border); background:var(--surface);
      color:var(--text); font-family:'Inter', sans-serif;
      font-size:15px; font-weight:600; text-align:center;
      transition:all 0.15s;
    }
    .log-input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--ring); }
    .log-input::placeholder { color:var(--muted); font-size:11px; font-weight:400; }
    .log-date { font-size:11px; color:var(--text3); }
    .log-btn-row { display:flex; gap:8px; margin-top:10px; }
    .btn-add-set {
      background:none; border:1px dashed var(--border); color:var(--text3);
      padding:8px; border-radius:var(--radius); width:100%;
      font-size:12px; font-weight:500; cursor:pointer;
      transition:all 0.15s; margin-top:4px;
    }
    .btn-add-set:hover { border-color:var(--accent); color:var(--accent); }

    /* ========== BUTTONS ========== */
    .btn {
      padding:10px 18px; border-radius:var(--radius); border:none;
      font-family:'Inter', sans-serif;
      font-size:13px; font-weight:600;
      cursor:pointer; transition:all 0.15s;
    }
    .btn:active { transform:scale(0.97); }
    .btn-save { background:var(--accent); color:#000; flex:1; }
    .btn-save:hover { filter:brightness(1.1); }
    .btn-clear { background:var(--surface2); color:var(--text3); border:1px solid var(--border); }
    .btn-clear:hover { background:var(--danger); color:#fff; border-color:var(--danger); }
    .btn-expand {
      background:none; border:1px solid var(--border); color:var(--text3);
      padding:9px 12px; border-radius:var(--radius);
      font-family:'Inter', sans-serif;
      font-size:12px; font-weight:500; cursor:pointer; width:100%;
      transition:all 0.15s;
    }
    .btn-expand:hover { border-color:var(--border-hi); color:var(--text2); background:var(--surface2); }
    .btn-expand.logged { border-color:rgba(34,197,94,0.3); color:var(--success); background:rgba(34,197,94,0.05); }

    /* ========== OVERVIEW CARDS ========== */
    .overview-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:16px; margin-bottom:12px;
    }
    .overview-card h3 {
      font-size:14px; font-weight:700; letter-spacing:-0.2px;
      color:var(--accent); margin-bottom:12px;
      padding-bottom:10px; border-bottom:1px solid var(--border);
    }
    .rule-row { display:flex; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); }
    .rule-row:last-child { border-bottom:none; }
    .rule-label { font-size:11px; font-weight:600; color:var(--accent); min-width:90px; text-transform:uppercase; letter-spacing:0.3px; }
    .rule-desc { font-size:12px; color:var(--text2); line-height:1.6; }

    /* ========== PROGRESS TRACKER ========== */
    .progress-compound {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); margin-bottom:10px; overflow:hidden;
    }
    .pc-header {
      padding:14px 16px; font-size:14px; font-weight:600; cursor:pointer;
      display:flex; justify-content:space-between; align-items:center;
      transition:background 0.15s;
    }
    .pc-header:hover { background:var(--surface2); }
    .pc-table { display:none; padding:0 12px 12px; }
    .pc-table.open { display:block; }
    .pc-row {
      display:grid; grid-template-columns:48px 1fr 2fr 52px;
      gap:4px; padding:6px 0; border-bottom:1px solid var(--border);
      align-items:center; font-size:12px;
    }
    .pc-row:last-child { border-bottom:none; }
    .pc-row.header { color:var(--accent); font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.3px; }
    .pc-row.deload { background:rgba(250,204,21,0.03); }
    .pc-row.test { background:rgba(239,68,68,0.03); }
    .pc-prog { text-align:center; font-size:11px; font-weight:600; }
    .pc-prog.up { color:var(--success-bright); }
    .pc-prog.down { color:var(--danger-bright); }
    .pc-prog.base { color:var(--text3); }
    .pc-wk { color:var(--text2); font-weight:500; }
    .pc-val { text-align:center; color:var(--text); font-weight:600; }
    .pc-val.empty { color:var(--muted); font-weight:400; }

    /* ========== MODALS ========== */
    .overlay {
      position:fixed; top:0; left:0; right:0; bottom:0;
      background:rgba(0,0,0,0.8); z-index:200;
      display:flex; align-items:center; justify-content:center; padding:20px;
      backdrop-filter:blur(4px);
    }
    .overlay.hidden { display:none; }
    .modal {
      background:var(--surface); border:1px solid var(--border);
      border-radius:calc(var(--radius) + 4px); padding:24px; max-width:380px; width:100%;
      box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);
    }
    .modal h3 { font-size:16px; font-weight:700; margin-bottom:8px; letter-spacing:-0.3px; }
    .modal p { font-size:13px; color:var(--text2); line-height:1.6; margin-bottom:16px; }
    .modal textarea {
      width:100%; height:120px; border-radius:var(--radius); border:1px solid var(--border);
      background:var(--bg); color:var(--text); padding:12px;
      font-family:'Inter', sans-serif; font-size:13px; resize:vertical;
    }
    .modal textarea:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--ring); }
    .modal-actions { display:flex; gap:10px; margin-top:16px; }
    .btn-danger { background:var(--danger); color:#fff; flex:1; }
    .btn-secondary { background:var(--surface2); color:var(--text2); flex:1; border:1px solid var(--border); }
    .btn-primary { background:var(--accent); color:#000; flex:1; }
    .danger-text { color:var(--danger-bright); }

    /* ========== TOAST ========== */
    .toast {
      position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
      background:var(--accent); color:#000;
      padding:10px 20px; border-radius:var(--radius);
      font-family:'Inter', sans-serif;
      font-size:13px; font-weight:600;
      z-index:300; opacity:0; transition:opacity 0.3s; pointer-events:none;
      box-shadow:0 0 20px var(--accent-glow), 0 4px 12px rgba(0,0,0,0.3);
    }
    .toast.show { opacity:1; }

    /* ========== BANNERS ========== */
    .deload-banner {
      background:rgba(250,204,21,0.06); border:1px solid rgba(250,204,21,0.15);
      border-radius:var(--radius); padding:12px 16px; margin-bottom:16px;
      font-size:13px; color:var(--yellow); line-height:1.5;
    }
    .deload-banner strong { display:block; font-size:13px; font-weight:700; margin-bottom:4px; }
    .test-banner {
      background:rgba(239,68,68,0.06); border:1px solid rgba(239,68,68,0.15);
      border-radius:var(--radius); padding:12px 16px; margin-bottom:16px;
      font-size:13px; color:var(--danger-bright); line-height:1.5;
    }
    .test-banner strong { display:block; font-size:13px; font-weight:700; margin-bottom:4px; }

    /* ========== DAILY STACK ========== */
    .stack-item { display:flex; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); }
    .stack-item:last-child { border-bottom:none; }
    .stack-label { font-size:11px; font-weight:600; color:var(--accent); min-width:75px; text-transform:uppercase; letter-spacing:0.3px; }
    .stack-target { font-size:14px; font-weight:700; min-width:80px; color:var(--text); }
    .stack-desc { font-size:12px; color:var(--text2); line-height:1.5; }

    .timer-btn {
      background:var(--surface2); color:var(--text); border:1px solid var(--border);
      padding:6px 10px; border-radius:var(--radius); font-size:12px; font-weight:600;
      cursor:pointer; font-family:'Inter', sans-serif; transition:all 0.15s; white-space:nowrap;
    }
    .timer-btn:hover { background:var(--surface3); }
    .timer-btn.active { background:var(--accent); color:#000; border-color:var(--accent); animation: pulse 1s infinite; }
    @keyframes pulse { 0% { opacity:1; } 50% { opacity:0.6; } 100% { opacity:1; } }
    
    .pr-badge {
      background: linear-gradient(135deg, #f59e0b, #fbbf24);
      color: #000; font-size: 9px; font-weight: 800;

const STORAGE_KEY = "alpha_cut_v2_logs";
const COMPLETION_KEY = "alpha_cut_v2_completions";
let state = { currentTab:"workout", currentPhase:0, currentWeek:0, currentDay:0, logs:{}, completions:{}, max1rm:{} };
let timerInterval = null;

function loadState() {
  try {
    const s1 = localStorage.getItem(STORAGE_KEY);
    if(s1) state.logs = JSON.parse(s1);
    const s2 = localStorage.getItem(COMPLETION_KEY);
    if(s2) state.completions = JSON.parse(s2);
    const s3 = localStorage.getItem("alphaCut_max1rm");
    if(s3) state.max1rm = JSON.parse(s3);
    migrateOldFormat();
  } catch(e) {}
}
function migrateOldFormat() {
  let changed = false;
  Object.keys(state.logs).forEach(key => {
    const log = state.logs[key];
    if(log && !log.sets) {
      state.logs[key] = {
        sets: [
          { weight: log.weight || '', reps: log.s1reps || '' },
          { weight: log.weight || '', reps: log.s2reps || '' }
        ],
        date: log.date || ''
      };
      changed = true;
    }
  });
  if(changed) saveState();
}
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.logs));
    localStorage.setItem(COMPLETION_KEY, JSON.stringify(state.completions));
    localStorage.setItem("alphaCut_max1rm", JSON.stringify(state.max1rm));
  } catch(e) {}
}
function logKey(pi,wi,di,ei) { return `p${pi}_w${wi}_d${di}_e${ei}`; }
function compKey(pi,wi,di) { return `p${pi}_w${wi}_d${di}`; }

function getPrevWeekLog(pi, wi, di, ei) {
  if (wi > 0) {
    const key = logKey(pi, wi-1, di, ei);
    if (state.logs[key]) return { log: state.logs[key], week: PROGRAM.phases[pi].weeks[wi-1] };
  }
  if (pi > 0) {
    const prevPhase = PROGRAM.phases[pi-1];
    const key = logKey(pi-1, 3, di, ei);
    if (state.logs[key]) return { log: state.logs[key], week: prevPhase.weeks[3] };
  }
  return null;
}

function getDayStats(pi, wi, di) {
  const phase = PROGRAM.phases[pi];
  const day = phase.days[di];
  let total = day.exercises.length;
  let logged = 0;
  day.exercises.forEach((ex, ei) => {
    const key = logKey(pi, wi, di, ei);
    const l = state.logs[key];
    if (l && l.sets && l.sets.some(s => s.weight || s.reps)) logged++;
  });
  return { total, logged, complete: logged === total };
}

function getCompletionDate(pi, wi, di) {
  return state.completions[compKey(pi,wi,di)] || null;
}

function checkAndMarkComplete(pi, wi, di) {
  const stats = getDayStats(pi, wi, di);
  const key = compKey(pi, wi, di);
  if (stats.complete && !state.completions[key]) {
    state.completions[key] = new Date().toLocaleDateString('en-CA');
    
    // Auto-advance logic
    if (checkPhaseComplete(pi)) {
      if (pi + 1 < PROGRAM.phases.length) {
        state.currentPhase = pi + 1;
        state.currentWeek = 0;
        state.currentDay = 0;
        setTimeout(() => showToast('Phase Complete! Moving to next phase 🚀'), 500);
      } else {
        setTimeout(() => showToast('Program Complete! 🎉'), 500);
      }
    } else if (checkWeekComplete(pi, wi)) {
      if (wi + 1 < PROGRAM.phases[pi].weeks.length) {
        state.currentWeek = wi + 1;
        state.currentDay = 0;
        setTimeout(() => showToast('Week Complete! Moving to next week 👍'), 500);
      }
    } else {
      if (di + 1 < PROGRAM.phases[pi].days.length) {
        state.currentDay = di + 1;
        setTimeout(() => showToast('Day Complete! Great job 💪'), 500);
      }
    }
    
    saveState();
  } else if (!stats.complete && state.completions[key]) {
    delete state.completions[key];
    saveState();
  }
}
function checkWeekComplete(pi, wi) {
  const p = PROGRAM.phases[pi];
  for(let di=0; di<p.days.length; di++) {
    if(!getDayStats(pi, wi, di).complete) return false;
  }
  return true;
}

function checkPhaseComplete(pi) {
  const p = PROGRAM.phases[pi];
  for(let wi=0; wi<p.weeks.length; wi++) {
    for(let di=0; di<p.days.length; di++) {
      if(!getDayStats(pi, wi, di).complete) return false;
    }
  }
  return true;
}

function render() {
  document.getElementById('app').className = 'theme-p' + (state.currentPhase + 1);
  renderNav();
  const m = document.getElementById('mainContent');
  switch(state.currentTab) {
    case 'workout': renderWorkout(m); break;
    case 'progress': renderProgress(m); break;
    case 'overview': renderOverview(m); break;
    case 'stack': renderStack(m); break;
  }
}
function renderNav() {
  const tabs = [{id:'workout',label:'WORKOUT'},{id:'progress',label:'PROGRESS'},{id:'overview',label:'RULES'},{id:'stack',label:'DAILY STACK'}];
  document.getElementById('mainNav').innerHTML = tabs.map(t =>
    `<div class="nav-tab ${state.currentTab===t.id?'active':''}" onclick="switchTab('${t.id}')">${t.label}</div>`
  ).join('');
}

function selectPhase(pi) { state.currentPhase=pi; state.currentWeek=0; state.currentDay=0; render(); window.scrollTo(0,0); }
function selectWeek(pi,wi) { state.currentPhase=pi; state.currentWeek=wi; state.currentDay=0; render(); window.scrollTo(0,0); }
function selectDay(di) { state.currentDay=di; render(); }
function toggleLog(ei) { document.getElementById(`logSection_${ei}`).classList.toggle('open'); }

function saveLog(ei, numSets) {
  const key = logKey(state.currentPhase, state.currentWeek, state.currentDay, ei);
  const ex = PROGRAM.phases[state.currentPhase].days[state.currentDay].exercises[ei];
  const sets = [];
  let maxEst1RM = 0;
  
  for(let si=0; si<numSets; si++) {
    const wStr = document.getElementById(`logW_${ei}_${si}`)?.value || '';
    const rStr = document.getElementById(`logR_${ei}_${si}`)?.value || '';
    
    const w2Input = document.getElementById(`logW2_${ei}_${si}`);
    const r2Input = document.getElementById(`logR2_${ei}_${si}`);
    
    const w = parseFloat(wStr) || 0;
    const r = parseFloat(rStr) || 0;
    if (w > 0 && r > 0) {
      const est1RM = w * (1 + r/30);
      if (est1RM > maxEst1RM) maxEst1RM = est1RM;
    }
    
    if (w2Input && r2Input) {
      sets.push({ weight: wStr, reps: rStr, weight2: w2Input.value, reps2: r2Input.value });
    } else {
      sets.push({ weight: wStr, reps: rStr });
    }
  }
  
  let isPR = false;
  if (ex.compound && maxEst1RM > 0) {
    if (!state.max1rm) state.max1rm = {};
    if (!state.max1rm[ex.name] || maxEst1RM > state.max1rm[ex.name]) {
      state.max1rm[ex.name] = maxEst1RM;
      isPR = true;
    }
  }

  state.logs[key] = { sets, date: new Date().toLocaleDateString('en-CA'), isPR };
  saveState();
  checkAndMarkComplete(state.currentPhase, state.currentWeek, state.currentDay);
  render();
  if (isPR) showToast('🎉 NEW PR! 🎉');
  else showToast('Logged ✓');
}

function clearLog(ei) {
  delete state.logs[logKey(state.currentPhase, state.currentWeek, state.currentDay, ei)];
  saveState();
  checkAndMarkComplete(state.currentPhase, state.currentWeek, state.currentDay);
  render();
  showToast('Cleared');
}

function addSet(ei) {
  const key = logKey(state.currentPhase, state.currentWeek, state.currentDay, ei);
  const section = document.getElementById(`logSection_${ei}`);
  if(!section.classList.contains('open')) section.classList.add('open');
  
  const sets = [];
  let si = 0;
  while(document.getElementById(`logW_${ei}_${si}`) || document.getElementById(`logR_${ei}_${si}`)) {
    const wStr = document.getElementById(`logW_${ei}_${si}`)?.value || '';
    const rStr = document.getElementById(`logR_${ei}_${si}`)?.value || '';
    const w2Str = document.getElementById(`logW2_${ei}_${si}`)?.value;
    const r2Str = document.getElementById(`logR2_${ei}_${si}`)?.value;
    
    let setObj = { weight: wStr, reps: rStr };
    if (w2Str !== undefined) setObj.weight2 = w2Str;
    if (r2Str !== undefined) setObj.reps2 = r2Str;
    sets.push(setObj);
    si++;
  }
  
  if(!state.logs[key]) {
    state.logs[key] = { sets: sets, date:'' };
  } else {
    state.logs[key].sets = sets;
  }
  
  state.logs[key].sets.push({ weight:'', reps:'' });
  saveState();
  render();
  const newSection = document.getElementById(`logSection_${ei}`);
  if(newSection) newSection.classList.add('open');
}

              if(state.logs[k]) found = state.logs[k];
            }
          });
        });
        const dl = gw===phase.deloadWeek;
        const tst = gw===phase.testWeek;
        let rc = 'pc-row'; if(dl) rc+=' deload'; if(tst) rc+=' test';
        const s0 = found?.sets?.[0];
        const s1 = found?.sets?.[1];
        let progHtml = '<span class="pc-prog">—</span>';
        if(s0?.weight && (s0?.reps || s1?.reps)) {
          let vol = 0;
          if (found?.sets) {
            found.sets.forEach(s => {
              const sw = parseFloat(s.weight) || 0;
              const sr = parseFloat(s.reps) || 0;
              vol += (sw * sr);
            });
          }
          if(baselineVol === null) {
            baselineVol = vol;
            progHtml = '<span class="pc-prog base">BASE</span>';
          } else if(vol > 0 && baselineVol > 0) {
            const pct = Math.round(((vol - baselineVol) / baselineVol) * 100);
            if(pct > 0) progHtml = `<span class="pc-prog up">▲${pct}%</span>`;
            else if(pct < 0) progHtml = `<span class="pc-prog down">▼${Math.abs(pct)}%</span>`;
            else progHtml = '<span class="pc-prog">0%</span>';
          }
        }
        let weightText = '—';
        let repText = '—';
        if (found?.sets && found.sets.length > 0) {
          const weightsArr = found.sets.map(s => s.weight).filter(w => w);
          if (weightsArr.length > 0) {
            const uniqueWeights = [...new Set(weightsArr)];
            weightText = uniqueWeights.join('/') + 'lbs';
          }
          const repsArr = found.sets.map(s => s.reps).filter(r => r);
          if (repsArr.length > 0) repText = repsArr.join(', ');
        }
        h += `<div class="${rc}">
          <span class="pc-wk">Wk ${gw}${dl?' ⚡':''}${tst?' 🔥':''}</span>
          <span class="pc-val ${weightText !== '—'?'':'empty'}" style="font-size:10px;">${weightText}</span>
          <span class="pc-val ${repText !== '—'?'':'empty'}">${repText}</span>
          ${progHtml}
        </div>`;
      });
    });
    h += `</div></div>`;
  });
  c.innerHTML = h;
}
function toggleProgress(i) {
  const t = document.getElementById(`pcT_${i}`);
  const a = document.getElementById(`pcA_${i}`);
  t.classList.toggle('open');
  a.textContent = t.classList.contains('open')?'▲':'▼';
}

    {l:"CARDIO",d:"LISS ONLY. 20 min incline walk (10-12% grade) or 10K steps. NO HIIT."},

function showToast(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }
function showModal(id) { document.getElementById(id).classList.remove('hidden'); }
function hideModal(id) { document.getElementById(id).classList.add('hidden'); }

function backupData() {
  const data = JSON.stringify({logs:state.logs, completions:state.completions}, null, 2);
  if(navigator.clipboard) {
    navigator.clipboard.writeText(data).then(()=>showToast('Backup copied ✓'));
  } else {
    const ta=document.createElement('textarea'); ta.value=data; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    showToast('Backup copied ✓');
  }
}

function doRestore() {
  try {
    const d = JSON.parse(document.getElementById('restoreInput').value.trim());
    state.logs = d.logs || d;
    state.completions = d.completions || {};
    saveState(); hideModal('restoreBox'); render(); showToast('Restored ✓');
  } catch(e) { showToast('Invalid data ✗'); }
}

function doReset() {
  state.logs={}; state.completions={}; state.max1rm={}; saveState(); hideModal('resetConfirm'); render(); showToast('Reset ✓');
}

function showHistory(exName) {
  const content = document.getElementById('historyContent');
  document.getElementById('historyTitle').textContent = exName + ' History';
  let historyHtml = '<table style="width:100%; font-size:12px; text-align:left; border-collapse:collapse;">';
  historyHtml += '<tr style="border-bottom:1px solid var(--border); color:var(--text3);"><th style="padding:4px;">Date</th><th style="padding:4px;">Sets</th></tr>';
  
  let found = [];
  PROGRAM.phases.forEach((p,pi) => {
    p.weeks.forEach((w,wi) => {
      p.days.forEach((d,di) => {
        d.exercises.forEach((ex,ei) => {
          if (ex.name === exName) {
            const l = state.logs[logKey(pi,wi,di,ei)];
            if (l && l.date) {
               const exNameLower = ex.name.toLowerCase();
               const repsLower = (ex.reps || '').toLowerCase();
               const isTimed = repsLower.includes('sec');
               const isUnilateral = repsLower.includes('/side') || repsLower.includes('/arm') || repsLower.includes('/leg') || exNameLower.includes('single-arm') || exNameLower.includes('single-leg') || exNameLower.includes('single arm') || exNameLower.includes('single leg');
               
               const setStr = l.sets.map(s => {
                 if(isTimed) return `${s.reps||'-'}s`;
                 if(isUnilateral) return `${s.weight||'-'}x${s.reps||'-'} | ${s.weight2||s.weight||'-'}x${s.reps2||s.reps||'-'}`;
                 return `${s.weight||'-'}x${s.reps||'-'}`;
               }).join(', ');
               found.push({date: l.date, sets: setStr, week: w});
            }
          }
        });
      });
    });
  });
  
  if (found.length === 0) {
    historyHtml = '<p style="font-size:13px; color:var(--text3);">No history logged yet.</p>';
  } else {
    found.sort((a,b) => new Date(b.date) - new Date(a.date));
    found.forEach(item => {
      historyHtml += `<tr style="border-bottom:1px solid var(--surface3);">
        <td style="padding:8px 4px;">${item.date} <span style="color:var(--text3); font-size:10px;">(Wk ${item.week})</span></td>
        <td style="padding:8px 4px; font-weight:600;">${item.sets}</td>
      </tr>`;
    });
    historyHtml += '</table>';
  }
  content.innerHTML = historyHtml;
  showModal('historyModal');
}

function startTimer(seconds, ei) {
  if (timerInterval) clearInterval(timerInterval);
  
  // Reset all timer buttons to their original text
  const btns = document.querySelectorAll('.timer-btn');
  btns.forEach(b => { 
    b.classList.remove('active'); 
    const originalTime = b.id.split('_').pop();
    if(originalTime) b.textContent = originalTime + 's';
  });
  
  let timeLeft = seconds;
  const btn = document.getElementById(`timerBtn_${ei}_${seconds}`);
  if (!btn) return;
  btn.classList.add('active');
  
  timerInterval = setInterval(() => {
    timeLeft--;
    btn.textContent = `⏳ ${timeLeft}s`;
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      btn.classList.remove('active');
      btn.textContent = `${seconds}s`;
      if ("vibrate" in navigator) navigator.vibrate([200, 100, 200, 100, 500]);
      showToast('Rest Complete!');
    }
  }, 1000);
}

loadState();
render();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js');
  });
}
